<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wedding Landing Page</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;700&family=Noto+Sans+KR:wght@300;400;600&display=swap" rel="stylesheet">
<style>
* {margin:0; padding:0; box-sizing:border-box;}
body {
  font-family: 'Noto Sans KR', sans-serif;
  background:#f8f6f4;
  color:#333;
  overflow-x:hidden;
}
section {
  padding:100px 20px;
  text-align:center;
}
.hero {
  height:100vh;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  background:linear-gradient(135deg,#e8dcd0,#f8f6f4);
}
.hero h1 {
  font-family:'Playfair Display';
  font-size:48px;
  margin-bottom:20px;
}
.hero p {
  font-size:18px;
  opacity:0.8;
}
.fade-up {
  opacity:0;
  transform:translateY(40px);
  transition:all 1s ease;
}
.fade-up.active {
  opacity:1;
  transform:translateY(0);
}
.gallery {
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
  gap:15px;
  max-width:1000px;
  margin:auto;
}
.gallery img {
  width:100%;
  border-radius:15px;
  transition:transform 0.4s ease;
}
.gallery img:hover {
  transform:scale(1.05);
}
.message-box {
  max-width:600px;
  margin:auto;
  background:white;
  padding:30px;
  border-radius:20px;
  box-shadow:0 10px 30px rgba(0,0,0,0.05);
}
button {
  padding:12px 25px;
  border:none;
  border-radius:30px;
  background:#c6a989;
  color:white;
  cursor:pointer;
  margin-top:20px;
}
button:hover {
  background:#b89672;
}
canvas {
  position:fixed;
  top:0;
  left:0;
  pointer-events:none;
}
@media only screen and (max-width: 600px) {
.hero h1 {
  font-size:30px;
}
}
</style>
</head>
<body>

<canvas id="confetti"></canvas>

<section class="hero fade-up">
  <h1>지수야 결혼 축하해 ♥</h1>
  <p>너의 가장 아름다운 시작을 응원해</p>
</section>

<section class="fade-up">
  <h2>우리의 추억</h2>
  <div class="gallery">
    <img src="https://picsum.photos/300/300?1">
    <img src="https://picsum.photos/300/300?2">
    <img src="https://picsum.photos/300/300?3">
    <img src="https://picsum.photos/300/300?4">
  </div>
</section>

<section class="fade-up">
  <h2>메시지</h2>
  <div class="message-box">
    <p id="msg">버튼을 눌러봐 💌</p>
    <button onclick="showMessage()">메시지 보기</button>
  </div>
</section>

<script>
// fade animation
const elements = document.querySelectorAll('.fade-up');
const observer = new IntersectionObserver(entries => {
  entries.forEach(entry => {
    if(entry.isIntersecting){
      entry.target.classList.add('active');
    }
  });
});

elements.forEach(el => observer.observe(el));

// message rotation
const messages = [
  "너의 모든 날이 사랑으로 가득하길",
  "평생 지금처럼 웃으면서 살자",
  "세상에서 제일 행복한 신부가 되길",
  "믿음, 소망, 사랑 그 중의 제일은 사랑이라-(고린도전서 13:13)",
  "두 사람이 한 사람보다 나음은 그들이 수고함으로 좋은 상을 얻을 것임이라-(전도서 4:9-10)",
  "정신 안차리면 술로 혼나 ♥",
  "하나님이 짝지어 주신 것을 사람이 나누지 못할지니라-(마태복음 19:6)"
];

function showMessage(){
  const random = messages[Math.floor(Math.random()*messages.length)];
  document.getElementById('msg').innerText = random;
}

// confetti effect
const canvas = document.getElementById('confetti');
const ctx = canvas.getContext('2d');
canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let pieces = [];
for(let i=0;i<100;i++){
  pieces.push({
    x:Math.random()*canvas.width,
    y:Math.random()*canvas.height,
    r:Math.random()*6+4,
    d:Math.random()*100
  });
}

function draw(){
  ctx.clearRect(0,0,canvas.width,canvas.height);
  ctx.fillStyle="#c6a989";
  ctx.beginPath();
  for(let i=0;i<pieces.length;i++){
    let p=pieces[i];
    ctx.moveTo(p.x,p.y);
    ctx.arc(p.x,p.y,p.r,0,Math.PI*2,true);
  }
  ctx.fill();
  update();
}

function update(){
  for(let i=0;i<pieces.length;i++){
    let p=pieces[i];
    p.y += Math.cos(p.d)+1;
    p.x += Math.sin(p.d);
    if(p.y>canvas.height){
      p.y=0;
      p.x=Math.random()*canvas.width;
    }
  }
}

setInterval(draw,30);
</script>

</body>
</html>
